<style>
  :root {

    --text-secondary:#6b8aad; --text-muted:#2d4a6a;
    --blue:#1a5ae1; --cyan:#11b4dc; --green:#22c55e;
    --red:#ef4444; --yellow:#f5c518; --sidebar-width: 220px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at 20% 0%, rgba(26,90,225,0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 10%, rgba(17,180,220,0.10) 0%, transparent 45%), #07111f;
    font-family:'DM Sans', sans-serif; color:var(--text-primary);
    display:flex; min-height:100vh; font-size:13px;
  }
  [data-theme="light"] {
    --bg:#f0f4f8; --sidebar-bg:#e8edf5; --card-bg:#ffffff;
    --card-border:rgba(26,90,225,0.15); --text-primary:#0f1e33;
    --text-secondary:#4a6080; --text-muted:#8fa3bb;
  }
  [data-theme="light"] body {
    background: radial-gradient(ellipse at 20% 0%, rgba(26,90,225,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 10%, rgba(17,180,220,0.06) 0%, transparent 45%), #f0f4f8;
  }
  [data-theme="light"]
  .sidebar {
    width: var(--sidebar-width);
    background: linear-gradient(180deg, rgba(26,90,225,0.08) 0%, rgba(6,14,26,0.98) 30%);
    border-right: 1px solid rgba(26,90,225,0.22);
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 100;
    overflow-y: auto;
  }
  [data-theme="light"]
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;

    font-size: 14px;

<script>
const SUPABASE_URL  = 'https://nybraioenihbdqdphpad.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55YnJhaW9lbmloYmRxZHBocGFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDY0MDgsImV4cCI6MjA5MDAyMjQwOH0.cca9uTB3hp7Z8CK3lheRsbUyJkuUrSnkIUzpyM6gCQM';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let allUsers = [];
let filteredUsers = [];

(async () => {
  document.documentElement.style.opacity = '0';
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'index.html';
    return;
  }
  document.documentElement.style.opacity = '1';
  applyTheme(localStorage.getItem('veltriq_theme') || 'dark');
  loadUsers();
})();

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
  }[ch]));
}

function formatDate(value, options = {}) {
  if (!value) return 'N/A';
  const date = new Date(String(value).includes('T') ? value : `${value}T00:00:00`);
  if (Number.isNaN(date.getTime())) return 'N/A';
  return date.toLocaleDateString('en-US', {
    month: options.short ? 'short' : 'long',
    day: 'numeric',
    year: 'numeric'
  });
}

function initialsFor(user) {
  const source = user.full_name || user.email || '?';
  return source.split(/[ @._-]/).filter(Boolean).map(part => part[0]).slice(0, 2).join('').toUpperCase() || '?';
}

function metroLabel(metro) {
  if (!metro) return 'Unknown';
  if (typeof metro === 'string') return metro;
  return metro.label || [metro.name, metro.state].filter(Boolean).join(', ') || metro.key || 'Unknown';
}

function dataTypeLabel(type) {
  if (type) return 'Visitor Recovery Access';
  return 'Not Set';
}

async function loadUsers() {
  const table = document.getElementById('usersTable');
  const errorBox = document.getElementById('errorBox');
  table.innerHTML = '<div class="empty-state">Loading users...</div>';
  errorBox.style.display = 'none';

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'index.html';
    return;
  }

  try {
    const endpoint = `${window.location.origin}/api/users`;
    const response = await fetch(endpoint, {
      headers: { Authorization: `Bearer ${session.access_token}` }
    });

    const responseText = await response.text();
    let body;
    try {
      body = responseText ? JSON.parse(responseText) : {};
    } catch (parseError) {
      const preview = responseText.replace(/\s+/g, ' ').trim().slice(0, 120);
      throw new Error(`Expected JSON from ${endpoint}, but received HTML/text instead. Make sure this site is deployed with the /api/users serverless function. Response preview: ${preview || 'empty response'}`);
    }

    if (!response.ok) throw new Error(body.error || body.msg || body.message || 'Unable to load users');

    allUsers = (body.users || [])
      .filter(user => Array.isArray(user.metro_access) && user.metro_access.length > 0)
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    populateMetroFilter();
    renderStats();
    renderUsers();
  } catch (error) {
    table.innerHTML = '<div class="empty-state">No users loaded</div>';
    errorBox.textContent = error.message;
    errorBox.style.display = 'block';
  }
}

function populateMetroFilter() {
  const select = document.getElementById('metroFilter');
  const current = select.value;
  const labels = new Set();
  allUsers.forEach(user => user.metro_access.forEach(metro => labels.add(metroLabel(metro))));
  select.innerHTML = '<option value="">All metros</option>' +
    [...labels].sort().map(label => `<option value="${escapeHtml(label)}">${escapeHtml(label)}</option>`).join('');
  if ([...select.options].some(option => option.value === current)) select.value = current;
}

function renderStats() {
  const seats = allUsers.reduce((sum, user) => sum + user.metro_access.length, 0);
  document.getElementById('statUsers').textContent = allUsers.length.toLocaleString();
  document.getElementById('statSubscribed').textContent = allUsers.length.toLocaleString();
  document.getElementById('statSeats').textContent = seats.toLocaleString();
}

function renderUsers() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const metroFilter = document.getElementById('metroFilter').value;

  filteredUsers = allUsers.filter(user => {
    const metros = user.metro_access.map(metroLabel);
    const text = [
      user.full_name, user.email, user.company, user.id, user.data_type,
      ...metros
    ].join(' ').toLowerCase();
    return (!search || text.includes(search)) &&
      (!metroFilter || metros.includes(metroFilter));
  });

  const table = document.getElementById('usersTable');
  if (!filteredUsers.length) {
    table.innerHTML = '<div class="empty-state">No users match the current filters</div>';
    return;
  }

  table.innerHTML = filteredUsers.map(user => {
    const metros = user.metro_access.map(metro => `<span class="pill">${escapeHtml(metroLabel(metro))}</span>`).join('');
    const name = user.full_name || 'Unnamed User';
    const company = user.company ? `<div class="company">${escapeHtml(user.company)}</div>` : '';

    return `
      <div class="user-row">
        <div class="person">
          <div class="avatar">${escapeHtml(initialsFor(user))}</div>
          <div style="min-width:0;">
            <div class="name">${escapeHtml(name)}</div>
            <div class="email">${escapeHtml(user.email || user.phone || user.id)}</div>
            ${company}
          </div>
        </div>
        <div class="metro-pills">${metros}</div>
        <div><span class="type-badge">${escapeHtml(dataTypeLabel(user.data_type))}</span></div>
      </div>`;
  }).join('');
}

function exportCsv() {
  const rows = [
    ['Name', 'Email', 'Company', 'Metros', 'Data Type', 'Created At', 'Last Sign In']
  ];
  filteredUsers.forEach(user => {
    rows.push([
      user.full_name || '',
      user.email || '',
      user.company || '',
      user.metro_access.map(metroLabel).join('; '),
      dataTypeLabel(user.data_type),
      user.created_at || '',
      user.last_sign_in_at || ''
    ]);
  });
  const csv = rows.map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'veltriq-users.csv';
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('veltriq_theme', theme);
  const isDark = theme === 'dark';
  const track = document.getElementById('toggleTrack');
  const thumb = document.getElementById('toggleThumb');
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (isDark) {
    track.classList.remove('on');
    thumb.classList.remove('on');
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    label.textContent = 'Dark Mode';
  } else {
    track.classList.add('on');
    thumb.classList.add('on');
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    label.textContent = 'Light Mode';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
</script>
