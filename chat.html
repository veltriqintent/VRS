<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.style.opacity = '1';</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VELTRIQ - Support</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#07111f; --sidebar-bg:#060e1a; --card-bg:#0c1828; --card-border:rgba(26,90,225,0.18); --text-primary:#e8edf3; --text-secondary:#6b8aad; --text-muted:#2d4a6a; --accent-blue:#1a5ae1; --accent-cyan:#11b4dc; --accent-green:#22c55e; --sidebar-width:220px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:radial-gradient(ellipse at 20% 0%,rgba(26,90,225,0.18) 0%,transparent 55%),radial-gradient(ellipse at 80% 10%,rgba(17,180,220,0.12) 0%,transparent 45%),#07111f; font-family:'DM Sans',sans-serif; color:var(--text-primary); display:flex; min-height:100vh; font-size:13px; }
  [data-theme="light"] { --bg:#f0f4f8; --sidebar-bg:#e8edf5; --card-bg:#ffffff; --card-border:rgba(26,90,225,0.15); --text-primary:#0f1e33; --text-secondary:#4a6080; --text-muted:#8fa3bb; }
  [data-theme="light"] body { background:#f0f4f8; }
  [data-theme="light"] .sidebar { background:linear-gradient(180deg,rgba(26,90,225,0.06) 0%,rgba(232,237,245,0.98) 30%); border-right-color:rgba(26,90,225,0.15); }
  [data-theme="light"] .nav-item { color:#4a6080; }
  [data-theme="light"] .support-card, [data-theme="light"] .quick-card { background:#ffffff; border-color:rgba(26,90,225,0.12); }
  .sidebar { width:var(--sidebar-width); background:linear-gradient(180deg,rgba(26,90,225,0.08) 0%,rgba(6,14,26,0.98) 30%); border-right:1px solid rgba(26,90,225,0.22); display:flex; flex-direction:column; padding:20px 0; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
  .logo { padding:0 18px 24px; border-bottom:1px solid var(--card-border); margin-bottom:18px; text-align:center; }

  .nav-section { padding: 0 14px; margin-bottom: 24px; }
  .nav-label {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1px; padding: 0 10px 10px; font-weight: 700;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    border-radius: 8px; color: var(--text-secondary); cursor: pointer;
    transition: all 0.15s; font-size: 14px; font-weight: 600; margin-bottom: 4px;
    text-decoration: none; border: none; background: transparent; font-family: inherit; width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: rgba(26,90,225,0.1); color: var(--text-primary); }
  .nav-item.active { background: rgba(26,90,225,0.18); color: #5b9fff; }
  .nav-item svg { width: 18px; height: 18px; opacity: 0.86; flex-shrink: 0; }
  .sidebar-bottom {
    margin-top: auto; padding: 18px 14px 0;
    border-top: 1px solid var(--card-border);
  }
  .theme-btn {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 8px; margin-top: 10px;
    background: rgba(26,90,225,0.08); border: 1px solid rgba(26,90,225,0.18);
    color: var(--text-secondary); font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; text-align: left;
  }
  .theme-btn:hover { background: rgba(26,90,225,0.14); color: var(--text-primary); }

  .toggle-track { width:32px; height:18px; border-radius:9px; background:rgba(26,90,225,0.3); position:relative; transition:background .25s; flex-shrink:0; }
  .toggle-track.on { background:#1a5ae1; }
  .toggle-thumb { position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; transition:transform .25s; box-shadow:0 1px 4px rgba(0,0,0,.3); }
  .toggle-thumb.on { transform:translateX(14px); }
  .main { margin-left:var(--sidebar-width); flex:1; padding:32px; min-width:0; }
  .page-title { font-size:24px; font-weight:800; letter-spacing:-.5px; }
  .page-sub { color:var(--text-secondary); font-size:13px; margin-top:4px; margin-bottom:24px; }
  .support-grid { display:grid; grid-template-columns:minmax(320px,1fr) 320px; gap:18px; align-items:start; }
  .support-card, .quick-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; box-shadow:0 16px 42px rgba(0,0,0,.16); }
  .support-card { overflow:hidden; }
  .support-head { padding:18px 20px; border-bottom:1px solid var(--card-border); display:flex; align-items:center; justify-content:space-between; }
  .status-pill { display:inline-flex; align-items:center; gap:8px; color:var(--accent-green); font-weight:800; font-size:12px; }
  .status-pill span { width:8px; height:8px; border-radius:50%; background:var(--accent-green); box-shadow:0 0 0 4px rgba(34,197,94,.12); }
  .messages { padding:22px; min-height:420px; display:flex; flex-direction:column; gap:12px; }
  .bubble { max-width:72%; padding:12px 14px; border-radius:12px; line-height:1.45; border:1px solid rgba(26,90,225,.14); }
  .bubble.agent { background:rgba(26,90,225,.08); color:var(--text-primary); }
  .bubble.user { background:linear-gradient(135deg,#1a5ae1,#1048b8); color:white; align-self:flex-end; }
  .composer { display:flex; gap:10px; padding:16px; border-top:1px solid var(--card-border); }
  .composer textarea { flex:1; min-height:44px; max-height:110px; resize:none; background:rgba(6,14,26,.48); border:1px solid var(--card-border); color:var(--text-primary); border-radius:10px; padding:12px; font:inherit; outline:none; }
  .composer button, .quick-card button { border:none; border-radius:10px; background:var(--accent-blue); color:#fff; font:inherit; font-weight:800; cursor:pointer; padding:0 18px; }
  .quick-card { padding:18px; }
  .quick-card h3 { font-size:15px; margin-bottom:6px; }
  .quick-card p { color:var(--text-secondary); font-size:12px; line-height:1.45; margin-bottom:14px; }
  .quick-list { display:grid; gap:9px; }
  .quick-list button { text-align:left; padding:11px 12px; background:rgba(26,90,225,.12); border:1px solid rgba(26,90,225,.18); }
  @media (max-width:1000px){ .support-grid{grid-template-columns:1fr;} }
</style>

<body>
<aside class="sidebar">
  <div class="logo"><div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;color:#5b9fff;">VELTRIQ</div><div style="font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;line-height:1.45;">Visitor Recovery System</div></div>
  <div class="nav-section"><div class="nav-label">Main</div>
    <button class="nav-item" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>VRS Overview</button>
    <button class="nav-item" onclick="location.href='intent.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Recovery Queue</button>
    <button class="nav-item" onclick="location.href='heatmap.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Recovery Map</button>
  </div>
  <div class="nav-section"><div class="nav-label">Account</div>
    <button class="nav-item active" onclick="location.href='chat.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Support</button>
    <button class="nav-item" onclick="location.href='profile.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</button>
  </div>
  <div class="sidebar-bottom"><button class="nav-item" onclick="location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button><button class="theme-btn" onclick="toggleTheme()"><span style="display:flex;align-items:center;gap:8px;"><svg id="themeIcon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"></svg><span id="themeLabel"></span></span><div class="toggle-track" id="toggleTrack"><div class="toggle-thumb" id="toggleThumb"></div></div></button></div>
</aside>
<main class="main">
  <div class="page-title">Support</div><div class="page-sub">Questions about VRS access, reports, imports, or recovery workflows.</div>
  <div class="support-grid">
    <section class="support-card"><div class="support-head"><div><strong>VRS Support Desk</strong><div style="color:var(--text-muted);font-size:12px;margin-top:2px;">Local support preview</div></div><div class="status-pill"><span></span>Online</div></div><div class="messages" id="messages"><div class="bubble agent"><strong>Hi there.</strong><br>How can we help with your VRS account today?</div></div><div class="composer"><textarea id="supportInput" placeholder="Type a message..."></textarea><button onclick="sendLocalMessage()">Send</button></div></section>
    <aside class="quick-card"><h3>Quick Help</h3><p>Use these prompts to start a focused support note.</p><div class="quick-list"><button onclick="quickPrompt('I need help importing a visitor CSV.')">CSV import help</button><button onclick="quickPrompt('I need help reviewing recovered visitor records.')">Review records</button><button onclick="quickPrompt('I need help preparing the webhook connection.')">Webhook setup</button></div></aside>
  </div>
</main>
<script>
function applyTheme(theme){document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('veltriq_theme',theme);const isDark=theme==='dark';document.getElementById('toggleTrack').classList.toggle('on',!isDark);document.getElementById('toggleThumb').classList.toggle('on',!isDark);document.getElementById('themeIcon').innerHTML=isDark?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>':'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';document.getElementById('themeLabel').textContent=isDark?'Dark Mode':'Light Mode';}
function toggleTheme(){applyTheme((document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'light':'dark');}
function quickPrompt(text){document.getElementById('supportInput').value=text;document.getElementById('supportInput').focus();}
function sendLocalMessage(){const input=document.getElementById('supportInput');const text=input.value.trim();if(!text)return;const el=document.createElement('div');el.className='bubble user';el.textContent=text;document.getElementById('messages').appendChild(el);input.value='';setTimeout(()=>{const reply=document.createElement('div');reply.className='bubble agent';reply.textContent='Got it. We will use this note to guide the next VRS support step.';document.getElementById('messages').appendChild(reply);},250);}
window.addEventListener('load',()=>applyTheme(localStorage.getItem('veltriq_theme')||'dark'));
</script>
